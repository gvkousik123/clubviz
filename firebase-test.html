<!DOCTYPE html>
<html>

<head>
    <title>Firebase Phone Auth Test</title>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

        // Your Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyAF_ltSByrLYa8YY8m71EsgPrKPM8EqhwE",
            authDomain: "clubwiz-auth.firebaseapp.com",
            projectId: "clubwiz-auth",
            storageBucket: "clubwiz-auth.appspot.com",
            messagingSenderId: "619308164050",
            appId: "1:619308164050:web:a5613ec4814b5239d69e8b"
        };

        console.log("🔥 Initializing Firebase with config:", firebaseConfig);

        // Update UI with detailed status
        function updateStatus(message, type = 'info') {
            const colors = { info: 'blue', success: 'green', error: 'red' };
            const existing = document.getElementById('result').innerHTML;
            document.getElementById('result').innerHTML = existing + `<div style="color: ${colors[type]};">${message}</div>`;
            console.log(message);
        }

        let app, auth, recaptchaVerifier;

        try {
            updateStatus("🔄 Initializing Firebase app...", 'info');

            // Initialize Firebase
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            updateStatus("✅ Firebase app initialized successfully", 'success');

            // Setup reCAPTCHA with error handling
            updateStatus("🔄 Setting up reCAPTCHA...", 'info');

            window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
                'size': 'normal',
                'callback': (response) => {
                    updateStatus("✅ reCAPTCHA verified - OTP sending enabled!", 'success');
                    document.getElementById('send-btn').disabled = false;
                    document.getElementById('send-btn').style.backgroundColor = '#4CAF50';
                    document.getElementById('send-btn').style.cursor = 'pointer';
                },
                'expired-callback': () => {
                    updateStatus("⚠️ reCAPTCHA expired - please verify again", 'error');
                    document.getElementById('send-btn').disabled = true;
                },
                'error-callback': (error) => {
                    updateStatus(`❌ reCAPTCHA error: ${error}`, 'error');
                }
            });

            // Render reCAPTCHA
            window.recaptchaVerifier.render().then((widgetId) => {
                window.recaptchaWidgetId = widgetId;
                updateStatus("✅ reCAPTCHA widget rendered - please complete the challenge", 'success');
            }).catch((error) => {
                updateStatus(`❌ reCAPTCHA render error: ${error.message}`, 'error');
            });

        } catch (error) {
            updateStatus(`❌ Firebase initialization error: ${error.message}`, 'error');
            console.error("Full error:", error);
        }

        // Test phone authentication
        window.sendOTP = async function () {
            const phoneNumber = document.getElementById('phone').value;
            console.log("📱 Sending OTP to:", phoneNumber);

            document.getElementById('result').innerHTML = '<div style="color: blue;">📤 Sending OTP...</div>';

            try {
                const confirmationResult = await signInWithPhoneNumber(auth, phoneNumber, window.recaptchaVerifier);
                window.confirmationResult = confirmationResult;

                console.log("✅ OTP sent successfully!");
                document.getElementById('result').innerHTML = `
                    <div style="color: green;">✅ OTP sent to ${phoneNumber}!</div>
                    <input type="text" id="otp" placeholder="Enter 6-digit OTP" maxlength="6" style="margin: 10px 0; padding: 5px;">
                    <button onclick="verifyOTP()">Verify OTP</button>
                `;
            } catch (error) {
                console.error("❌ Error sending OTP:", error);
                document.getElementById('result').innerHTML = `<div style="color: red;">❌ Error: ${error.message}</div>`;
            }
        };

        window.verifyOTP = async function () {
            const otp = document.getElementById('otp').value;
            console.log("🔑 Verifying OTP:", otp);

            try {
                const result = await window.confirmationResult.confirm(otp);
                console.log("✅ Phone number verified:", result.user);
                document.getElementById('result').innerHTML = `
                    <div style="color: green;">✅ Phone verified successfully!</div>
                    <div>User ID: ${result.user.uid}</div>
                    <div>Phone: ${result.user.phoneNumber}</div>
                `;
            } catch (error) {
                console.error("❌ OTP verification failed:", error);
                document.getElementById('result').innerHTML = `<div style="color: red;">❌ OTP verification failed: ${error.message}</div>`;
            }
        };

    </script>
</head>

<body style="font-family: Arial, sans-serif; padding: 20px;">
    <h1>🔥 Firebase Phone Auth Test</h1>

    <div style="margin: 20px 0;">
        <input type="tel" id="phone" placeholder="+91 7337066524" value="+917337066524"
            style="padding: 10px; width: 200px;">
        <button id="send-btn" onclick="sendOTP()" disabled style="padding: 10px; margin-left: 10px;">Send OTP</button>
    </div>

    <div id="recaptcha-container"></div>

    <div id="result" style="margin-top: 20px; padding: 10px; border: 1px solid #ccc; min-height: 50px;">
        <div style="color: gray;">🔄 Initializing Firebase...</div>
    </div>

    <div style="margin-top: 20px; font-size: 12px; color: #666;">
        <strong>Test Steps:</strong><br>
        1. Wait for reCAPTCHA to load<br>
        2. Complete reCAPTCHA challenge<br>
        3. Click "Send OTP"<br>
        4. Enter the OTP you receive<br>
        5. Click "Verify OTP"
    </div>
</body>

</html>
