version: '3.9'

services:
  clubviz-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://clubwiz.in
        NEXT_PUBLIC_SOCKET_URL: https://clubwiz.in
        NEXT_PUBLIC_APP_ENV: production
    container_name: clubviz
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: '1'
      NEXT_PUBLIC_API_URL: https://clubwiz.in
      NEXT_PUBLIC_SOCKET_URL: https://clubwiz.in
      NEXT_PUBLIC_APP_ENV: production
    restart: unless-stopped
    networks:
      - clubviz-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  clubviz-nginx:
    image: nginx:1.27-alpine
    container_name: clubviz-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/app.conf:/etc/nginx/conf.d/app.conf:ro
    depends_on:
      - clubviz-frontend
    restart: unless-stopped
    networks:
      - clubviz-net

networks:
  clubviz-net:
    driver: bridge