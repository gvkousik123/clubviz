version: '3.8'


services:
  # Nginx Reverse Proxy with SSL
  nginx:
    image: nginx:alpine
    container_name: clubwiz-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/ssl/certs:ro
    depends_on:
      - clubwiz-backend
    networks:
      - clubwiz-network

  # MongoDB Database (Development - No Auth)
  mongodb:
    image: mongo:7.0
    container_name: clubwiz-mongodb-dev
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: clubwiz_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init-dev.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - clubwiz-network
    command: mongod --noauth
    healthcheck:
      test: ["CMD", "mongosh", "clubwiz_db", "--eval", "db.runCommand({ping: 1})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Spring Boot Application (Development)
  clubwiz-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clubwiz-backend-dev
    restart: unless-stopped
    environment:
      # MongoDB Configuration (No Auth for Dev)
      SPRING_DATA_MONGODB_HOST: mongodb
      SPRING_DATA_MONGODB_PORT: 27017
      SPRING_DATA_MONGODB_DATABASE: clubwiz_db
      
      # Server Configuration (HTTP only, SSL handled by Nginx)
      SERVER_PORT: 8080
      
      # JWT Configuration (Development)
      APP_JWT_SECRET: devSecretKey123456789012345678901234567890123456789012345678901234567890
      APP_JWT_ACCESS_TOKEN_EXPIRATION: 86400000
      APP_JWT_REFRESH_TOKEN_EXPIRATION: 604800000
      
      # File Upload Configuration
      APP_UPLOAD_DIR: /app/uploads/
      
      # CORS Configuration (Allow all for dev)
      APP_CORS_ALLOWED_ORIGINS: "http://localhost:3000,https://localhost:3000,http://18.205.19.179,https://18.205.19.179,http://*:3000,https://*:3000"
      
      # Development Profile
      SPRING_PROFILES_ACTIVE: development
      
      # Logging Configuration (Verbose for dev)
      LOGGING_LEVEL_COM_CLUBWIZ: DEBUG
      LOGGING_LEVEL_ROOT: INFO
      
      # OpenAPI/Swagger Configuration
      SPRINGDOC_SWAGGER_UI_SERVERS: '[{"url":"/api","description":"Current Server"},{"url":"https://localhost/api","description":"Local HTTPS"},{"url":"http://localhost:8080/api","description":"Local HTTP"}]'
      # Google OAuth Client ID for verifying ID tokens (development)
      APP_GOOGLE_CLIENT_ID: "856039728227-9m6erc453nb5pun22m0qfhamfts8trou.apps.googleusercontent.com"
    expose:
      - "8080"  # Only expose to internal network
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - mongodb
    networks:
      - clubwiz-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  mongodb_data:
    driver: local
  uploads_data:
    driver: local

networks:
  clubwiz-network:
    driver: bridge